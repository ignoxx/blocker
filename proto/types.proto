syntax = "proto3";

option go_package = "github.com/ignoxx/blocker/proto";

import "google/protobuf/empty.proto";

service Node {
  rpc Handshake(Version) returns (Version);
  rpc HandleTransaction(Transaction) returns (google.protobuf.Empty);
  rpc HandleBlock(Block) returns (google.protobuf.Empty);
}

message Version {
  string version = 1;
  int32 height = 2;
  string listenAddr = 3;
  repeated string peerList = 4;
  repeated bytes validators = 5;
}

message Block {
  Header header = 1;
  repeated Transaction transactions = 2;
  bytes publicKey = 3;
  bytes signature = 4;
}

message Header{
  int32 version = 1;
  int32 height = 2; // index of the blocks
  bytes prevHash = 3;
  bytes rootHash = 4; // merkle root of txs
  int64 timestamp = 5;
}

message TxInput {
  // prev. hash of the tx containing the output
  // we want to spend
  bytes prevTxHash = 1;
  // the index of the output of the prev. tx
  // we want to spend
  uint32 prevOutIndex = 2;
  bytes publicKey = 3;
  bytes signature = 4;
}

message TxOutput {
  // int64 to keep it simple
  int64 amount = 1;
  bytes address = 2;
}

message Transaction{
  int32 version = 1;
  repeated TxInput inputs = 2;
  repeated TxOutput outputs = 3;
}

